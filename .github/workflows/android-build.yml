name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build variant to assemble"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install NDK & CMake
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "ndk;28.2.13676358" "cmake;3.22.1"

      # Speeds up repeat builds a lot: caches ~/.gradle/caches, wrapper dists, etc.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode release keystore
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > release.keystore
          else
            echo "No RELEASE_KEYSTORE_BASE64 secret set; release build will fall back to debug signing (see app/build.gradle.kts)."
          fi

      - name: Build debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -f release.keystore ]; then
            ./gradlew assembleRelease --stacktrace \
              -PRELEASE_STORE_FILE="$RELEASE_STORE_FILE" \
              -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
              -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" \
              -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD"
          else
            ./gradlew assembleRelease --stacktrace
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepdrop-apk-${{ github.event.inputs.build_type || 'debug' }}
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Upload lint/test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports
            app/build/test-results
          if-no-files-found: ignore
